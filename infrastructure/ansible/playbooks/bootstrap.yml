---
- name: Bootstrap VPS — system hardening and essential tools
  hosts: vps
  become: true

  tasks:
    # ── System update ──────────────────────────────────────────────────────────

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Upgrade all packages
      apt:
        upgrade: dist
        autoremove: true
      environment:
        DEBIAN_FRONTEND: noninteractive

    # ── Security tools ─────────────────────────────────────────────────────────

    - name: Install security and essential packages
      apt:
        name:
          - ufw
          - fail2ban
          - unattended-upgrades
          - apt-listchanges
          - curl
          - wget
          - git
          - htop
          - iotop
          - nethogs
          - jq
          - net-tools
          - ca-certificates
          - gnupg
          - lsb-release
          - software-properties-common
          - apache2-utils # provides htpasswd for ArgoCD password hashing
        state: present

    # ── Unattended upgrades ────────────────────────────────────────────────────

    - name: Configure unattended-upgrades
      copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
              "${distro_id}:${distro_codename}-security";
              "${distro_id}ESMApps:${distro_codename}-apps-security";
              "${distro_id}ESM:${distro_codename}-infra-security";
          };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";
          Unattended-Upgrade::Automatic-Reboot "false";

    - name: Enable unattended-upgrades
      debconf:
        name: unattended-upgrades
        question: unattended-upgrades/enable_auto_updates
        value: "true"
        vtype: boolean

    # ── UFW firewall ───────────────────────────────────────────────────────────
    - name: Check UFW status
      shell: |
        ufw status | grep -q "Status: active"
      register: ufw_active
      failed_when: false

    - name: Reset UFW to defaults
      ufw:
        state: reset
      when: ufw_active.rc != 0

    - name: Set UFW default policies
      ufw:
        direction: "{{ item.direction }}"
        policy: "{{ item.policy }}"
      loop:
        - { direction: incoming, policy: deny }
        - { direction: outgoing, policy: allow }
      when: ufw_active.rc != 0

    - name: Allow required ports
      ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: tcp
        comment: "{{ item.comment }}"
      loop:
        - { port: "22", comment: "SSH" }
        - { port: "80", comment: "HTTP" }
        - { port: "443", comment: "HTTPS" }
        - { port: "6443", comment: "Kubernetes API" }
        - { port: "9100", comment: "Node Exporter" }
        - { port: "10254", comment: "Nginx Ingress Metrics" }
      when: ufw_active.rc != 0

    - name: Enable UFW
      ufw:
        state: enabled
      when: ufw_active.rc != 0

    # ── Fail2ban ───────────────────────────────────────────────────────────────

    - name: Configure fail2ban
      copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime  = 3600
          findtime = 600
          maxretry = 5
          destemail = admin@{{ domain }}
          sendername = Fail2Ban

          [sshd]
          enabled  = true
          port     = ssh
          logpath  = %(sshd_log)s
          backend  = %(sshd_backend)s
          maxretry = 3
          bantime  = 86400

    - name: Enable and start fail2ban
      systemd:
        name: fail2ban
        enabled: true
        state: restarted

    # ── Kernel / system tuning ─────────────────────────────────────────────────

    - name: Set system file limits
      blockinfile:
        path: /etc/security/limits.conf
        marker: "# {mark} ANSIBLE MANAGED — studio-s"
        block: |
          * soft nofile 65536
          * hard nofile 65536
          * soft nproc  32768
          * hard nproc  32768

    - name: Apply kernel optimisations
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop:
        - { name: net.core.somaxconn, value: "32768" }
        - { name: net.ipv4.tcp_max_syn_backlog, value: "8192" }
        - { name: net.ipv4.ip_local_port_range, value: "1024 65535" }
        - { name: net.ipv4.tcp_tw_reuse, value: "1" }
        - { name: net.ipv4.tcp_fin_timeout, value: "15" }
        - { name: fs.file-max, value: "2097152" }
        - { name: fs.inotify.max_user_watches, value: "524288" }

    - name: Apply bridge sysctl settings (requires br_netfilter — loaded by k3s)
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
        ignoreerrors: true
      loop:
        - { name: net.bridge.bridge-nf-call-iptables, value: "1" }
        - { name: net.bridge.bridge-nf-call-ip6tables, value: "1" }

    # ── MOTD ───────────────────────────────────────────────────────────────────

    - name: Set MOTD
      copy:
        dest: /etc/motd
        content: |
          ════════════════════════════════════════════════════════════
             Studio-S Kubernetes Cluster  —  Powered by k3s
          ════════════════════════════════════════════════════════════

          Quick Commands:
            studio-status          - View cluster status
            kubectl get pods -n studio-s
            kubectl logs -f <pod>  - Stream pod logs

          Access:
            ArgoCD:  https://argocd.{{ domain }}
            Grafana: https://grafana.{{ domain }}

          ════════════════════════════════════════════════════════════

    # ── Application directories ────────────────────────────────────────────────

    - name: Create application directories
      file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /opt/studio-s
        - /opt/studio-s/config
        - /opt/studio-s/logs
        - /opt/studio-s/backups

    - name: Create secrets directory (restricted)
      file:
        path: /opt/studio-s/secrets
        state: directory
        mode: "0700"

    # ── Backup cron ────────────────────────────────────────────────────────────

    - name: Install backup script
      copy:
        dest: /opt/studio-s/backup.sh
        mode: "0755"
        content: |
          #!/bin/bash
          set -e
          BACKUP_DIR="/opt/studio-s/backups"
          DATE=$(date +%Y%m%d_%H%M%S)
          mkdir -p "$BACKUP_DIR"
          kubectl get all --all-namespaces -o yaml > "$BACKUP_DIR/k8s-resources-$DATE.yaml"
          kubectl get secrets --all-namespaces -o yaml > "$BACKUP_DIR/k8s-secrets-$DATE.yaml"
          kubectl get configmaps --all-namespaces -o yaml > "$BACKUP_DIR/k8s-configmaps-$DATE.yaml"
          tar czf "$BACKUP_DIR/k3s-$DATE.tar.gz" /var/lib/rancher/k3s /etc/rancher/k3s
          find "$BACKUP_DIR" -name "*.tar.gz" -mtime +7 -delete
          find "$BACKUP_DIR" -name "*.yaml"   -mtime +7 -delete
          echo "Backup complete: $DATE"

    - name: Schedule daily backup at 02:00
      cron:
        name: studio-s backup
        minute: "0"
        hour: "2"
        job: /opt/studio-s/backup.sh >> /opt/studio-s/logs/backup.log 2>&1
