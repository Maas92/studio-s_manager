[defaults]
inventory           = inventory.yml
remote_user         = root
host_key_checking   = False
stdout_callback     = yaml
callbacks_enabled   = timer, profile_tasks

# Retry files clutter the repo
retry_files_enabled = False

# Speed up SSH connections by reusing them
[ssh_connection]
ssh_args            = -o ControlMaster=auto -o ControlPersist=30m -o ServerAliveInterval=60
pipelining          = True