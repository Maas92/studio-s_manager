apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: studio-s-production
  namespace: argocd
  # Cascade delete: removing this Application will also remove all k8s resources it manages
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Maas92/studio-s_manager.git
    targetRevision: main
    path: k8s/overlays/production

  destination:
    server: https://kubernetes.default.svc
    namespace: studio-s

  syncPolicy:
    automated:
      prune: true      # Delete resources removed from git
      selfHeal: true   # Revert manual kubectl changes automatically
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

---
# Staging app — points at the staging overlay on the same repo
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: studio-s-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/Maas92/studio-s_manager.git
    targetRevision: develop   # or a staging branch if you have one
    path: k8s/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: studio-s

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m