name: Build and Deploy Application

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths-ignore:
      - 'infrastructure/**'
      - '**.md'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/studio-s

jobs:
  # Build and push Docker images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    strategy:
      matrix:
        include:
          - service: auth
            context: ./auth
          - service: backend
            context: ./backend
          - service: api-proxy-server
            context: ./api-proxy-server
          - service: frontend
            context: ./frontend
          - service: google-contacts
            context: ./google-contacts-service
          - service: whatsapp-api
            context: ./whatsapp-notification-service
            dockerfile: ./whatsapp-notification-service/Dockerfile.api
          - service: whatsapp-worker
            context: ./whatsapp-notification-service
            dockerfile: ./whatsapp-notification-service/Dockerfile.worker
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            
      - name: Save tag
        run: |
          TAG="main-$(echo ${{ github.sha }} | cut -c1-7)"
          mkdir -p /tmp/tags/tag-${{ matrix.service }}
          echo "$TAG" > /tmp/tags/tag-${{ matrix.service }}/tag-${{ matrix.service }}.txt
            
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          file: ${{ matrix.dockerfile || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Upload tags
        uses: actions/upload-artifact@v4
        with:
          name: tags
          path: /tmp/tags

  # Update Kubernetes manifests
  update-manifests:
    permissions:
      contents: write
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "overlay_dir=k8s/overlays/production" >> $GITHUB_OUTPUT
            echo "tag=main-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "overlay_dir=k8s/overlays/staging" >> $GITHUB_OUTPUT
            echo "tag=staging-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "overlay_dir=k8s/overlays/dev" >> $GITHUB_OUTPUT
            echo "tag=dev-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi
      
      - name: Download tags
        uses: actions/download-artifact@v4
        with:
          name: tags
          path: /tmp/tags
      - name: Update image tags
        run: |
          OVERLAY_DIR="${{ steps.env.outputs.overlay_dir }}"
          echo "Updating tags in $OVERLAY_DIR"
          cd $OVERLAY_DIR

          for SERVICE in auth backend api-proxy-server frontend whatsapp-api whatsapp-worker; do
            TAG_FILE="/tmp/tags/tag-${SERVICE}/tag-${SERVICE}.txt"
            if [ -f "$TAG_FILE" ]; then
              TAG=$(cat "$TAG_FILE")
              kustomize edit set image \
                ghcr.io/maas92/studio-s-${SERVICE}=ghcr.io/maas92/studio-s-${SERVICE}:${TAG}
              echo "Updated $SERVICE to tag: $TAG"
            else
              echo "No tag file for $SERVICE, skipping"
            fi
          done     
      - name: Commit and push tag updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update image tags to ${{ steps.env.outputs.tag }} [skip ci]"
          git push