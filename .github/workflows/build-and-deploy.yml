name: Build and Deploy Application

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths-ignore:
      - 'infrastructure/**'
      - '**.md'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/studio-s

jobs:
  # Build and push Docker images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    strategy:
      matrix:
        include:
          - service: auth
            context: ./auth
          - service: backend
            context: ./backend
          - service: api-proxy-server
            context: ./api-proxy-server
          - service: frontend
            context: ./frontend
          - service: google-contacts
            context: ./google-contacts-service
          - service: whatsapp-api
            context: ./whatsapp-notification-service
            dockerfile: ./whatsapp-notification-service/Dockerfile.api
          - service: whatsapp-worker
            context: ./whatsapp-notification-service
            dockerfile: ./whatsapp-notification-service/Dockerfile.worker
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.service == 'frontend' && 'VITE_API_BASE_URL=/api' || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max