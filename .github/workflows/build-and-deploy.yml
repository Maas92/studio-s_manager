name: Build and Deploy Application

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths-ignore:
      - 'infrastructure/**'
      - '**.md'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/studio-s

jobs:
  # Build and push Docker images
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    strategy:
      matrix:
        include:
          - service: auth
            context: ./auth
          - service: backend
            context: ./backend
          - service: api-proxy-server
            context: ./api-proxy-server
          - service: frontend
            context: ./frontend
          - service: google-contacts
            context: ./google-contacts-service
          - service: whatsapp-api
            context: ./whatsapp-notification-service
            dockerfile: ./whatsapp-notification-service/Dockerfile.api
          - service: whatsapp-worker
            context: ./whatsapp-notification-service
            dockerfile: ./whatsapp-notification-service/Dockerfile.worker
        
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
  # Update Kubernetes manifests
  update-manifests:
    permissions:
      contents: write
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "tag=v${{ github.sha }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "tag=staging-${{ github.sha }}" >> $GITHUB_OUTPUT
          else
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "tag=dev-${{ github.sha }}" >> $GITHUB_OUTPUT
          fi
          
      - name: Update image tags
        run: |
          cd k8s/overlays/${{ steps.env.outputs.environment }}
          
          # Update kustomization.yaml with new image tags
          TAG=${{ steps.env.outputs.tag }}

          for SERVICE in auth backend api-proxy-server frontend; do
            kustomize edit set image \
              ${{ env.IMAGE_PREFIX }}-$SERVICE=${{ env.IMAGE_PREFIX }}-$SERVICE:$TAG
          done
          
      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add k8s/overlays/${{ steps.env.outputs.environment }}/kustomization.yaml
          git commit -m "Update ${{ steps.env.outputs.environment }} images to ${{ steps.env.outputs.tag }}"
          git push