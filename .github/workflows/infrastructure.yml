name: Deploy Infrastructure

on:
  push:
    branches:
      - main
      - staging
      - dev
    paths:
      - 'infrastructure/**'
  pull_request:
    paths:
      - 'infrastructure/**'

jobs:

  # ============================================================
  # Job 1 — Pulumi (DNS records only)
  # ============================================================
  pulumi:
    name: Pulumi — Cloudflare DNS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Pulumi CLI
        uses: pulumi/actions@v4

      - name: Install dependencies
        working-directory: infrastructure
        run: npm ci

      - name: Select Pulumi stack
        working-directory: infrastructure
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            pulumi stack select production --create
          elif [[ "${{ github.ref }}" == "refs/heads/staging" ]]; then
            pulumi stack select staging --create
          else
            pulumi stack select dev --create
          fi
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Pulumi preview (PRs only)
        if: github.event_name == 'pull_request'
        working-directory: infrastructure
        run: pulumi preview
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Pulumi up (push to branch)
        if: github.event_name == 'push'
        working-directory: infrastructure
        run: pulumi up --yes
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  # ============================================================
  # Job 2 — Ansible (server setup, only on push not PRs)
  # ============================================================
  ansible:
    name: Ansible — Server setup
    runs-on: ubuntu-latest
    needs: pulumi
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible --quiet

      - name: Write SSH private key to disk
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Run bootstrap playbook
        working-directory: infrastructure/ansible
        run: |
          ansible-playbook -i inventory.yml playbooks/bootstrap.yml
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          DOMAIN: ${{ vars.DOMAIN }}
          SSH_KEY_PATH: /tmp/deploy_key

      - name: Run k3s playbook
        working-directory: infrastructure/ansible
        run: |
          ansible-playbook -i inventory.yml playbooks/k3s.yml
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          DOMAIN: ${{ vars.DOMAIN }}
          SSH_KEY_PATH: /tmp/deploy_key

      - name: Run cluster-tools playbook
        working-directory: infrastructure/ansible
        run: |
          ansible-playbook -i inventory.yml playbooks/cluster-tools.yml
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          DOMAIN: ${{ vars.DOMAIN }}
          SSH_KEY_PATH: /tmp/deploy_key
          ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}

      - name: Run argocd playbook
        working-directory: infrastructure/ansible
        run: |
          ansible-playbook -i inventory.yml playbooks/argocd.yml
        env:
          VPS_IP: ${{ secrets.VPS_IP }}
          DOMAIN: ${{ vars.DOMAIN }}
          SSH_KEY_PATH: /tmp/deploy_key
          ARGOCD_ADMIN_PASSWORD: ${{ secrets.ARGOCD_ADMIN_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GATEWAY_SECRET: ${{ secrets.GATEWAY_SECRET }}
          GIT_REPO_URL: ${{ github.server_url }}/${{ github.repository }}

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/deploy_key