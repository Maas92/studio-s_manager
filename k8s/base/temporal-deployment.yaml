apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: studio-s
  labels:
    app: temporal
    tier: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
        tier: infrastructure
    spec:
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h temporal-postgresql -U temporal; do
                echo "Waiting for temporal-postgresql..."
                sleep 2
              done
      containers:
        - name: temporal
          image: temporalio/auto-setup:1.22.4
          ports:
            - containerPort: 7233
              name: grpc
          env:
            - name: LOG_LEVEL
              value: "warn"
            - name: DB
              value: "postgresql"
            - name: DB_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: "temporal"
            - name: POSTGRES_SEEDS
              value: "temporal-postgresql"
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: temporal-postgresql
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 7233
            initialDelaySeconds: 30
            periodSeconds: 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: studio-s
  labels:
    app: temporal-ui
    tier: infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
        tier: infrastructure
    spec:
      containers:
        - name: temporal-ui
          image: temporalio/ui:2.21.3
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LOG_LEVEL
              value: "warn"
            - name: TEMPORAL_ADDRESS
              value: "temporal:7233"
            - name: TEMPORAL_PORT
              value: "7233"
            - name: TEMPORAL_CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TEMPORAL_CORS_ORIGINS
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
