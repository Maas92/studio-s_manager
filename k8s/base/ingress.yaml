# Ingress 1: API routes — strips /api prefix before forwarding to gateway
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: studio-s-ingress
  namespace: studio-s
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.studiosbeautybar.com
      secretName: studio-s-tls
  rules:
    - host: app.studiosbeautybar.com
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: gateway
                port:
                  number: 4000

---
# Ingress 2: Frontend — no rewrite, serves static files including env.js
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: studio-s-frontend-ingress
  namespace: studio-s
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.studiosbeautybar.com
      secretName: studio-s-app-tls
  rules:
    - host: app.studiosbeautybar.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80

---
# Temporal UI — restrict to your IP, not public
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: temporal-ui-ingress
  namespace: studio-s
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/whitelist-source-range: "YOUR_HOME_OR_OFFICE_IP/32"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - temporal.studiosbeautybar.com
      secretName: temporal-tls
  rules:
    - host: temporal.studiosbeautybar.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: temporal-ui
                port:
                  number: 8080
