apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: temporal-postgresql
  namespace: studio-s
  labels:
    app: temporal-postgresql
    tier: database
spec:
  serviceName: temporal-postgresql
  replicas: 1
  selector:
    matchLabels:
      app: temporal-postgresql
  template:
    metadata:
      labels:
        app: temporal-postgresql
        tier: database
    spec:
      containers:
        - name: postgresql
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "temporal"
            - name: POSTGRES_DB
              value: "temporal"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: temporal-postgresql
                  key: password
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          livenessProbe:
            exec:
              command: [pg_isready, -U, temporal]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            exec:
              command: [pg_isready, -U, temporal]
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: temporal-postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: temporal-postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
