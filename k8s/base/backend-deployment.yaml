apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: studio-s
  labels:
    app: backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
        tier: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/maas92/studio-s-backend:latest
          ports:
            - containerPort: 5003
              name: http
            - containerPort: 5005
              name: mtls
          env:
            - name: PORT
              value: "5003"
            - name: SERVICE_NAME
              value: "backend-service"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: NODE_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL
            - name: DB_SSL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_SSL
            - name: DB_POOL_LOGGING
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_POOL_LOGGING
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: AUTH_SERVICE_URL
            - name: MTLS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MTLS_ENABLED
            - name: MTLS_CA_CERT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MTLS_CA_CERT
            - name: MTLS_CERT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MTLS_CERT
            - name: MTLS_KEY
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MTLS_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: connectionString
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secrets
                  key: secret
            - name: GATEWAY_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secrets
                  key: gatewaySecret
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase
                  key: url
            - name: SUPABASE_SERVICE_ROLE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase
                  key: serviceRoleKey
          volumeMounts:
            - name: certs
              mountPath: /app/certs
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: certs
          secret:
            secretName: backend-certs
