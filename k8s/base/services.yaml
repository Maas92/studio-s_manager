apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: studio-s
spec:
  type: ClusterIP
  ports:
    - port: 5002
      targetPort: 5002
      name: http
  selector:
    app: auth

---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: studio-s
spec:
  type: ClusterIP
  ports:
    - port: 5003
      targetPort: 5003
      name: http
    - port: 5005
      targetPort: 5005
      name: mtls
  selector:
    app: backend

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: studio-s
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
      name: http
  selector:
    app: gateway

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: studio-s
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: frontend

---
apiVersion: v1
kind: Service
metadata:
  name: google-contacts
  namespace: studio-s
spec:
  type: ClusterIP
  ports:
    - port: 5004
      targetPort: 5004
      name: http
  selector:
    app: google-contacts

---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: studio-s
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  selector:
    app: notification-api

---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: studio-s
spec:
  type: ClusterIP
  ports:
    - port: 7233
      targetPort: 7233
      name: grpc
  selector:
    app: temporal

---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: studio-s
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: temporal-ui

---
# Headless service for StatefulSet pod DNS resolution
apiVersion: v1
kind: Service
metadata:
  name: temporal-postgresql
  namespace: studio-s
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: temporal-postgresql
