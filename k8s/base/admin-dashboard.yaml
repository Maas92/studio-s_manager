apiVersion: v1
kind: ConfigMap
metadata:
  name: admin-dashboard
  namespace: studio-s
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Studio-S Admin</title>
      <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #333; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 30px; }
        .card { background: #f5f5f5; border-radius: 8px; padding: 20px; text-align: center; text-decoration: none; color: #333; display: block; }
        .card:hover { background: #e0e0e0; }
        .card h3 { margin: 10px 0 5px; }
        .card p { margin: 0; font-size: 12px; color: #666; }
      </style>
    </head>
    <body>
      <h1>Studio-S Infrastructure</h1>
      <div class="grid">
        <a class="card" href="https://app.studiosbeautybar.com" target="_blank">
          <h3>Application</h3><p>Main App</p>
        </a>
        <a class="card" href="https://argocd.studiosbeautybar.com" target="_blank">
          <h3>ArgoCD</h3><p>Deployments</p>
        </a>
        <a class="card" href="https://grafana.studiosbeautybar.com" target="_blank">
          <h3>Grafana</h3><p>Metrics & Dashboards</p>
        </a>
        <a class="card" href="https://prometheus.studiosbeautybar.com" target="_blank">
          <h3>Prometheus</h3><p>Raw Metrics</p>
        </a>
        <a class="card" href="https://temporal.studiosbeautybar.com" target="_blank">
          <h3>Temporal</h3><p>Workflow UI</p>
        </a>
      </div>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-dashboard
  namespace: studio-s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-dashboard
  template:
    metadata:
      labels:
        app: admin-dashboard
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: admin-dashboard

---
apiVersion: v1
kind: Service
metadata:
  name: admin-dashboard
  namespace: studio-s
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: admin-dashboard

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: admin-dashboard-ingress
  namespace: studio-s
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/whitelist-source-range: "YOUR_HOME_IP/32"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - admin.studiosbeautybar.com
      secretName: admin-tls
  rules:
    - host: admin.studiosbeautybar.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: admin-dashboard
                port:
                  number: 80