---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      log_level: warn

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      # Kubernetes pod logs — reads directly from node filesystem
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
        pipeline_stages:
          # Parse JSON logs from your Node.js services
          - json:
              expressions:
                level: level
                msg: msg
                service: service
                env: env
                requestId: requestId
                method: method
                path: path
                statusCode: statusCode
                durationMs: durationMs
          - labels:
              level:
              service:
              env:
          # Drop noisy kube-probe health check logs
          - drop:
              expression: '.*kube-probe.*'
          - drop:
              expression: '.*Liveness probe.*'
          - drop:
              expression: '.*Readiness probe.*'
        relabel_configs:
          # Use pod namespace as label
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          # Use pod name as label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          # Use container name as label
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Use app label as service name
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          # Build the log path
          - source_labels:
              [
                __meta_kubernetes_pod_uid,
                __meta_kubernetes_pod_container_name,
              ]
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1*/*$2*/*.log
          # Only scrape studio-s and monitoring namespaces
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: studio-s|monitoring|argocd

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/proxy, services, endpoints, pods]
    verbs: [get, watch, list]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: monitoring

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - key: node-role.kubernetes.io/master
          effect: NoSchedule
      containers:
        - name: promtail
          image: grafana/promtail:2.9.3
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - containerPort: 9080
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: positions
              mountPath: /tmp
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "100m"
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: positions
          emptyDir: {}