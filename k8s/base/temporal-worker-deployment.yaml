apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  namespace: studio-s
  labels:
    app: temporal-worker
    tier: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: temporal-worker
  template:
    metadata:
      labels:
        app: temporal-worker
        tier: worker
    spec:
      containers:
        - name: temporal-worker
          image: ghcr.io/maas92/studio-s-whatsapp-worker:latest
          # No ports — pure background worker
          env:
            - name: LOG_LEVEL
              value: "WARNING"
            - name: TEMPORAL_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TEMPORAL_HOST
            - name: TEMPORAL_NAMESPACE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: TEMPORAL_NAMESPACE
            - name: BUSINESS_NAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: BUSINESS_NAME
            - name: BUSINESS_PHONE
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: BUSINESS_PHONE
            - name: BUSINESS_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: BUSINESS_ADDRESS
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: database-credentials
                  key: connectionString
            - name: CHAKRA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chakra-api
                  key: apiKey
            - name: CHAKRA_API_URL
              valueFrom:
                secretKeyRef:
                  name: chakra-api
                  key: apiUrl
            - name: WHATSAPP_PROVIDER
              valueFrom:
                secretKeyRef:
                  name: chakra-api
                  key: whatsappProvider
            - name: WHATSAPP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: chakra-api
                  key: apiKey
            - name: WHATSAPP_PHONE_NUMBER
              valueFrom:
                secretKeyRef:
                  name: chakra-api
                  key: whatsappPhoneNumber
            - name: CHAKRA_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: chakra-api
                  key: apiUrl
            - name: SUPPORT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: chakra-api
                  key: supportEmail
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          # No HTTP endpoint — use exec probe
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys; sys.exit(0)"
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
