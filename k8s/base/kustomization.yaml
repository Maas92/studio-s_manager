apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: studio-s

generatorOptions:
  disableNameSuffixHash: true

patches:
  - patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: ghcr-pull-secret
    target:
      kind: Deployment

  - patch: |-
      - op: add
        path: /spec/template/spec/imagePullSecrets
        value:
          - name: ghcr-pull-secret
    target:
      kind: StatefulSet

resources:
  - namespace.yaml
  - configmap.yaml
  - auth-deployment.yaml
  - backend-deployment.yaml
  - gateway-deployment.yaml
  - frontend-deployment.yaml
  - google-contacts-deployment.yaml
  - notification-api-deployment.yaml
  - temporal-worker-deployment.yaml
  - temporal-postgresql-deployment.yaml
  - temporal-deployment.yaml
  - services.yaml
  - ingress.yaml
