apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: studio-s

bases:
  - ../../base

namePrefix: dev-

replicas:
  - name: auth
    count: 1
  - name: backend
    count: 1
  - name: gateway
    count: 1
  - name: frontend
    count: 1

images:
  - name: ghcr.io/Maas92/studio-s-auth
    newTag: dev-latest
  - name: ghcr.io/Maas92/studio-s-backend
    newTag: dev-latest
  - name: ghcr.io/Maas92/studio-s-gateway
    newTag: dev-latest
  - name: ghcr.io/Maas92/studio-s-frontend
    newTag: dev-latest

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=development
      - LOG_LEVEL=debug

patches:
  - patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "64Mi"
    target:
      kind: Deployment
      name: auth
