apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: studio-s

resources:
  - ../../base

replicas:
  - name: auth
    count: 2
  - name: backend
    count: 2
  - name: gateway
    count: 2
  - name: frontend
    count: 2
  - name: google-contacts
    count: 1
  - name: notification-api
    count: 1
  - name: temporal-worker
    count: 2
  - name: temporal
    count: 1
  - name: temporal-ui
    count: 1

images:
  - name: ghcr.io/maas92/studio-s-auth
    newTag: latest
  - name: ghcr.io/maas92/studio-s-backend
    newTag: latest
  - name: ghcr.io/maas92/studio-s-api-proxy-server
    newTag: latest
  - name: ghcr.io/maas92/studio-s-frontend
    newTag: latest
  - name: ghcr.io/maas92/studio-s-google-contacts
    newTag: latest
  - name: ghcr.io/maas92/studio-s-whatsapp-api
    newTag: latest
  - name: ghcr.io/maas92/studio-s-whatsapp-worker
    newTag: latest

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - NODE_ENV=production
      - LOG_LEVEL=warn

resources:
  - hpa.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
      spec:
        template:
          spec:
            containers:
            - name: backend
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "400m"
                limits:
                  memory: "1Gi"
                  cpu: "800m"
    target:
      kind: Deployment
      name: backend
